<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube RAG Chatbot</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
height:100vh;
display:flex;
background:#0f172a;
overflow:hidden;
}

.sidebar{
width:320px;
background:#111827;
padding:20px;
border-right:1px solid #374151;
color:white;
}

.sidebar h2{
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
border:none;
outline:none;
border-radius:8px;
margin-bottom:12px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
font-weight:bold;
cursor:pointer;
margin-bottom:12px;
}

button:hover{
background:#1d4ed8;
}

.status{
margin-top:10px;
font-size:14px;
color:#22c55e;
word-break:break-word;
}

.chat-area{
flex:1;
display:flex;
flex-direction:column;
}

.header{
background:#111827;
color:white;
padding:20px;
font-size:24px;
font-weight:bold;
}

.chat-box{
flex:1;
padding:20px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:15px;
}

.msg{
max-width:75%;
padding:12px 16px;
border-radius:12px;
line-height:1.6;
word-wrap:break-word;
}

.user{
align-self:flex-end;
background:#2563eb;
color:white;
}

.bot{
align-self:flex-start;
background:#1e293b;
color:white;
}

.input-area{
display:flex;
padding:15px;
background:#111827;
gap:10px;
}

.input-area input{
flex:1;
margin:0;
}

.send-btn{
width:120px;
margin:0;
}

</style>
</head>

<body>

<div class="sidebar">

<h2>🎥 Video RAG</h2>

<input
type="text"
id="youtubeUrl"
placeholder="Paste YouTube URL"
/>

<button onclick="processVideo()">
Load Video
</button>

<div class="status" id="status">
No Video Loaded
</div>

</div>

<div class="chat-area">

<div class="header">
🎥 YouTube Video RAG Chatbot
</div>

<div class="chat-box" id="chatBox">

<div class="msg bot">
Paste a YouTube URL and click Load Video. Then ask questions about the video.
</div>

</div>

<div class="input-area">

<input
type="text"
id="question"
placeholder="Ask anything about the video..."
>

<button
class="send-btn"
onclick="askQuestion()">
Send
</button>

</div>

</div>

<script>

const API = "https://youtube-chatbot-using-rag-hhzr.onrender.com";

let VIDEO_LOADED = false;

function addMessage(text,type){

const chat =
document.getElementById("chatBox");

const div =
document.createElement("div");

div.className =
"msg " + type;

div.innerText = text;

chat.appendChild(div);

chat.scrollTop =
chat.scrollHeight;
}

async function processVideo(){

const url =
document.getElementById("youtubeUrl")
.value
.trim();

if(!url){

alert("Enter YouTube URL");

return;
}

try{

document.getElementById("status")
.innerHTML =
"Processing video...";

const response =
await fetch(
`${API}/process-video`,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
url:url
})
}
);

const data =
await response.json();

console.log(data);

if(
data.status !== "success" &&
data.status !== "already_processed"
){

alert(
data.message ||
"Failed to process video"
);

document.getElementById("status")
.innerHTML =
"Failed";

return;
}

VIDEO_LOADED = true;

document.getElementById("status")
.innerHTML =
"✅ Video Loaded Successfully";

addMessage(
"Video processed successfully. You can now ask questions.",
"bot"
);

}
catch(error){

console.error(error);

alert(
"Video Processing Failed"
);

document.getElementById("status")
.innerHTML =
"Error";
}
}

async function askQuestion(){

if(!VIDEO_LOADED){

alert(
"Load a video first"
);

return;
}

const question =
document.getElementById("question")
.value
.trim();

if(!question){
return;
}

addMessage(
question,
"user"
);

document.getElementById("question")
.value = "";

try{

const response =
await fetch(
`${API}/ask`,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
question:question
})
}
);

const data =
await response.json();

console.log(data);

const answer =
data.answer ||
"Sorry, I couldn't generate a response.";

addMessage(
answer,
"bot"
);

}
catch(error){

console.error(error);

addMessage(
"Server Error",
"bot"
);
}
}

document
.getElementById("question")
.addEventListener(
"keypress",
function(e){

if(e.key==="Enter"){

askQuestion();

}
}
);

</script>

</body>
</html>
